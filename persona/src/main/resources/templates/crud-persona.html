<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Personas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Datos de Personas</h1>
        <table class="table table-striped table-bordered">
            <thead class="table-dark">

                <form th:action="@{/guardar}" th:object="${persona}" method="post" class="mb-4">
                    <div class="row">
                        <div class="col">
                            <input type="text" th:field="*{nombre}" class="form-control" placeholder="Nombre" required>
                        </div>
                        <div class="col">
                            <input type="text" th:field="*{apellido}" class="form-control" placeholder="Apellido" required>
                        </div>
                        <div class="col">
                            <input type="number" th:field="*{edad}" class="form-control" placeholder="Edad" required>
                        </div>
                        <div class="col">
                            <input type="text" th:field="*{usuario}" class="form-control" placeholder="Usuario" required>
                        </div>
                        <div class="col">
                            <input type="password" th:field="*{contrasena}" class="form-control" placeholder="Contraseña" required>
                        </div>
                        <div class="col">
                            <button type="submit" class="btn btn-success">Guardar</button>
                        </div>
                    </div>
                </form>

                <br>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Edad</th>
                    <th>Usuario</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="persona : ${personas}">
                    <td th:text="${persona.id}"></td>
                    <td th:text="${persona.nombre}"></td>
                    <td th:text="${persona.apellido}"></td>
                    <td th:text="${persona.edad}"></td>
                    <td th:text="${persona.usuario}"></td>
                    <td>
                        <a th:href="@{/editar/{id}(id=${persona.id})}"
                           class="btn btn-warning btn-sm">Editar</a>

                        <a th:href="@{/eliminar/{id}(id=${persona.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Estas seguro de eliminar esta persona?')">
                           Eliminar
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>

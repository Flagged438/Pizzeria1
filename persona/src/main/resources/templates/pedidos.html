<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pedidos - Pizzería ITAT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; }
        .section-title {
            font-family: 'Playfair Display', serif;
            color: #e63946;
        }
        .navbar-brand {
            font-family: 'Playfair Display', serif;
            color: #e63946 !important;
        }
        .badge-hora { font-size: 1rem; }
        .estado-PENDIENTE  { color: #ffc107; font-weight: bold; }
        .estado-EN_PROCESO { color: #0d6efd; font-weight: bold; }
        .estado-ENTREGADO  { color: #198754; font-weight: bold; }
        .estado-RECHAZADO  { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">🍕 ITAT</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/pedidos}">Pedidos</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/informe}">Informe</a></li>
                <li class="nav-item ms-2">
                    <button id="toggleModo" class="btn btn-outline-light" onclick="toggleDarkMode()">
                        🌙 Modo Oscuro
                    </button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <!-- ALERTA DE RESULTADO -->
    <div th:if="${mensaje}"
         th:class="'alert alert-' + ${tipoMensaje} + ' alert-dismissible fade show'"
         role="alert">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- CONTADOR DE PEDIDOS POR HORA -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="section-title">Hacer un Pedido</h1>
        <span class="badge bg-danger badge-hora">
            Pedidos esta hora:
            <span th:text="${pedidosHora}"></span> /
            <span th:text="${limitePorHora}"></span>
        </span>
    </div>

    <!-- FORMULARIO DE PEDIDO -->
    <div class="card shadow mb-5">
        <div class="card-body">
            <form th:action="@{/pedidos/nuevo}" th:object="${pedido}" method="post">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Nombre del cliente</label>
                        <input type="text" th:field="*{nombreCliente}" class="form-control"
                               placeholder="Tu nombre" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Producto</label>
                        <select th:field="*{producto}" class="form-select" required>
                            <option value="">Selecciona una pizza</option>
                            <option value="Pizza Napolitana">🍕 Pizza Napolitana</option>
                            <option value="Pizza Pepperoni">🍕 Pizza Pepperoni</option>
                            <option value="Pizza Hawaiana">🍕 Pizza Hawaiana</option>
                            <option value="Pizza Vegetariana">🍕 Pizza Vegetariana</option>
                            <option value="Pizza 4 Quesos">🍕 Pizza 4 Quesos</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Cantidad</label>
                        <input type="number" th:field="*{cantidad}" class="form-control"
                               min="1" max="10" value="1" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Total ($)</label>
                        <input type="number" th:field="*{total}" class="form-control"
                               step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-danger w-100">🍕 Pedir</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- TABLA DE PEDIDOS DEL DÍA -->
    <h2 class="section-title mb-3">Pedidos de Hoy</h2>
    <div class="table-responsive">
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Cliente</th>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Total</th>
                    <th>Hora</th>
                    <th>Estado</th>
                    <th>Ticket</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${pedidos}">
                    <td th:text="${p.nombreCliente}"></td>
                    <td th:text="${p.producto}"></td>
                    <td th:text="${p.cantidad}"></td>
                    <td th:text="'$' + ${p.total}"></td>
                    <td th:text="${#temporals.format(p.fechaHora, 'HH:mm:ss')}"></td>
                    <td>
                        <span th:class="'estado-' + ${p.estado}" th:text="${p.estado}"></span>
                    </td>
                    <td>
                        <a th:href="@{/ticket/{id}(id=${p.id})}"
                           class="btn btn-sm btn-outline-danger"
                           target="_blank">
                            📄 Descargar
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(pedidos)}">
                    <td colspan="7" class="text-center text-muted">No hay pedidos hoy todavía.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
    <p>© 2026 <span style="color:#e63946">Pizzería ITAT</span> — Hecho con ❤️ y mucho queso</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const html = document.documentElement;
    const btn  = document.getElementById('toggleModo');
    const temaGuardado = localStorage.getItem('tema') || 'light';
    aplicarTema(temaGuardado);

    function toggleDarkMode() {
        const actual = html.getAttribute('data-bs-theme');
        const nuevo  = actual === 'dark' ? 'light' : 'dark';
        aplicarTema(nuevo);
        localStorage.setItem('tema', nuevo);
    }

    function aplicarTema(tema) {
        html.setAttribute('data-bs-theme', tema);
        btn.textContent = tema === 'dark' ? '☀️ Modo Claro' : '🌙 Modo Oscuro';
    }
</script>
</body>
</html>
